<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9-Limit Playable Diagram</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-base: #e9eef6;
        --bg-deep: #dce6f3;
        --ink: #0f1a2b;
        --ink-muted: #44546b;
        --panel: rgba(252, 255, 255, 0.72);
        --panel-border: rgba(128, 160, 201, 0.38);
        --accent: #1d76d1;
        --accent-strong: #155ca4;
        --accent-glow: rgba(29, 118, 209, 0.28);
      }

      body {
        font-family: "Sora", "Segoe UI", sans-serif;
        background: radial-gradient(
            circle at 12% 12%,
            #ffffff 0%,
            transparent 44%
          ),
          radial-gradient(circle at 82% 0%, #d8e9ff 0%, transparent 38%),
          linear-gradient(160deg, var(--bg-base), var(--bg-deep));
        color: var(--ink);
        margin: 0;
        padding: 28px 20px 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      h1 {
        font-family: "Space Grotesk", "Sora", sans-serif;
        font-size: clamp(1.6rem, 2.6vw, 2.3rem);
        font-weight: 700;
        letter-spacing: 0.02em;
        margin: 0 0 8px;
        color: #10243d;
        text-wrap: balance;
      }

      p {
        color: var(--ink-muted);
        margin-top: 0;
        margin-bottom: 24px;
        text-align: center;
        max-width: 720px;
        line-height: 1.45;
      }

      #controls {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 10px 12px;
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(19, 48, 86, 0.12);
      }

      label {
        font-weight: 600;
        color: #2c415e;
      }

      select {
        appearance: none;
        border: 1px solid #a9c2df;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 15px;
        font-family: "Sora", "Segoe UI", sans-serif;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        min-width: 180px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      select:focus-visible {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(29, 118, 209, 0.2);
      }

      button {
        background: linear-gradient(135deg, var(--accent), #2f8ee8);
        color: #f5fbff;
        border: 1px solid #0f5aa7;
        padding: 11px 18px;
        font-size: 15px;
        font-weight: 600;
        font-family: "Space Grotesk", "Sora", sans-serif;
        letter-spacing: 0.01em;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.14s, box-shadow 0.2s, filter 0.2s;
        box-shadow: 0 6px 14px var(--accent-glow);
      }

      button:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      #canvas-container {
        background: var(--panel);
        border-radius: 16px;
        border: 1px solid var(--panel-border);
        box-shadow: 0 20px 40px rgba(14, 35, 64, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.92);
        padding: 12px 0 12px 0;
        width: 85vw;
        max-width: 1100px;
        min-width: 0;
        overflow-x: auto;
        overflow-y: visible;
        display: block;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x;
        box-sizing: border-box;
      }

      #graph-target {
        width: 100%;
        min-width: 0;
        overflow: visible;
        box-sizing: border-box;
        display: block;
        margin: 0 auto;
        background: transparent;
        touch-action: none;
      }

      /* Styling applied to the dynamically generated SVG */
      #graph-target svg {
        width: 100%;
        max-width: 1100px;
        height: auto;
        max-height: 80vh;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        display: block;
        margin: 0 auto;
        box-sizing: border-box;
      }
      /* Landscape: altura máxima do SVG = 90% da viewport */
      @media (orientation: landscape) {
        #graph-target svg {
          max-height: 90vh;
        }
      }

      @media (max-width: 900px) {
        #graph-target svg {
          max-width: 900px;
        }
      }

      @media (max-width: 640px) {
        #canvas-container {
          padding: 8px 0 8px 0;
        }
        #graph-target svg {
          max-width: 640px;
        }
      }

      .node {
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .node text {
        user-select: none;
        -webkit-user-select: none;
      }

      .node:hover circle {
        fill: #e8f4ff !important;
        stroke: var(--accent) !important;
        stroke-width: 2px;
        transition: all 0.2s;
      }

      .edge {
        cursor: pointer;
      }

      .edge:hover .edge-path {
        opacity: 0.82;
      }

      .edge-hit-area {
        fill: none !important;
        stroke: transparent !important;
        stroke-width: 18px;
        pointer-events: stroke;
        vector-effect: non-scaling-stroke;
      }

      @media (max-width: 640px) {
        body {
          padding: 20px 12px 24px;
        }

        #controls {
          width: 100%;
          justify-content: stretch;
        }

        button,
        select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <h1>9-Limit Playable Diagram</h1>
    <p>
      Click the button to enable audio, then click any node to hear the
      corresponding frequency. Solid arrows represent the harmonic series, while
      dashed arrows represent the sub-harmonic series.
    </p>

    <div id="controls">
      <button id="audio-toggle">Enable Audio Synthesizer</button>
    </div>

    <div id="canvas-container">
      <div id="graph-target">Loading diagram...</div>
    </div>

    <script>
      // Base fundamental frequency
      const BASE_FREQ = 220;

      // Web Audio API setup
      let audioCtx = null;
      const colorCanvasCtx = document.createElement("canvas").getContext("2d");
      const graphTarget = document.getElementById("graph-target");
      let swipePointerId = null;
      let lastSwipeNodeValue = "";

      // Initializes the audio context after a user click
      document
        .getElementById("audio-toggle")
        .addEventListener("click", function() {
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            this.textContent = "Synthesizer Enabled (Ready)";
            this.style.backgroundColor = "#28a745";
            this.style.boxShadow = "0 4px 6px rgba(40, 167, 69, 0.15)";
          } else if (audioCtx.state === "suspended") {
            audioCtx.resume();
          }
        });

      function getNodeValueFromElement(element) {
        const node = element?.closest?.(".node");
        if (!node) return "";

        const titleElement = node.querySelector("title");
        return titleElement ? titleElement.textContent.trim() : "";
      }

      function playSwipeNode(nodeValue) {
        if (!nodeValue || nodeValue === lastSwipeNodeValue) return;
        lastSwipeNodeValue = nodeValue;
        playTone(nodeValue);
      }

      function handleSwipePointerDown(event) {
        if (event.pointerType === "mouse" && event.button !== 0) return;

        const nodeValue = getNodeValueFromElement(event.target);
        if (!nodeValue) return;

        swipePointerId = event.pointerId;
        lastSwipeNodeValue = "";
        if (graphTarget.setPointerCapture) {
          graphTarget.setPointerCapture(event.pointerId);
        }
        event.preventDefault();
        playSwipeNode(nodeValue);
      }

      function handleSwipePointerMove(event) {
        if (swipePointerId === null || event.pointerId !== swipePointerId)
          return;

        event.preventDefault();
        const pointedElement = document.elementFromPoint(
          event.clientX,
          event.clientY
        );
        const nodeValue = getNodeValueFromElement(pointedElement);
        playSwipeNode(nodeValue);
      }

      function stopSwipePointer(event) {
        if (swipePointerId === null || event.pointerId !== swipePointerId)
          return;

        if (
          graphTarget.releasePointerCapture &&
          graphTarget.hasPointerCapture &&
          graphTarget.hasPointerCapture(event.pointerId)
        ) {
          graphTarget.releasePointerCapture(event.pointerId);
        }

        swipePointerId = null;
        lastSwipeNodeValue = "";
      }

      function setupSwipePlayback() {
        graphTarget.addEventListener("pointerdown", handleSwipePointerDown);
        graphTarget.addEventListener("pointermove", handleSwipePointerMove, {
          passive: false
        });
        graphTarget.addEventListener("pointerup", stopSwipePointer);
        graphTarget.addEventListener("pointercancel", stopSwipePointer);
        graphTarget.addEventListener("lostpointercapture", stopSwipePointer);
      }

      setupSwipePlayback();

      function normalizeColor(color) {
        if (!color || !colorCanvasCtx) return "";
        colorCanvasCtx.fillStyle = "#000000";
        colorCanvasCtx.fillStyle = color;
        return colorCanvasCtx.fillStyle.trim().toLowerCase();
      }

      function parseRatioValue(ratioString) {
        if (ratioString.includes("/")) {
          const parts = ratioString.split("/");
          return parseFloat(parts[0]) / parseFloat(parts[1]);
        }

        return parseFloat(ratioString);
      }

      function playRatioGroup(ratios) {
        if (!audioCtx) {
          alert("Please click the 'Enable Audio Synthesizer' button first!");
          return;
        }

        const uniqueRatios = [...new Set(ratios)].filter(Boolean);
        if (uniqueRatios.length === 0) return;

        const now = audioCtx.currentTime;
        const peakGain = Math.min(0.3, 0.6 / Math.sqrt(uniqueRatios.length));

        uniqueRatios.forEach(ratioString => {
          const ratioValue = parseRatioValue(ratioString);
          const targetFrequency = BASE_FREQ * ratioValue;

          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();

          oscillator.type = "sine";
          oscillator.frequency.value = targetFrequency;

          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(peakGain, now + 0.01);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2);

          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          oscillator.start(now);
          oscillator.stop(now + 3);
        });
      }

      // Plays the frequency calculated from a node ratio
      function playTone(ratioString) {
        const ratioValue = parseRatioValue(ratioString);

        const targetFrequency = BASE_FREQ * ratioValue;
        console.log(
          `Playing node: ${ratioString} | Ratio: ${ratioValue} | Frequency: ${targetFrequency.toFixed(
            2
          )}Hz`
        );
        playRatioGroup([ratioString]);
      }

      function extractEdgeColor(edge) {
        const path = edge.querySelector("path");
        const polygon = edge.querySelector("polygon");

        const rawColor =
          path?.getAttribute("stroke") ||
          polygon?.getAttribute("fill") ||
          polygon?.getAttribute("stroke") ||
          "";

        return normalizeColor(rawColor);
      }

      function sanitizeRatioLabel(label) {
        return label.replace(/^"+|"+$/g, "").trim();
      }

      function extractRatiosFromEdge(edge) {
        const titleElement = edge.querySelector("title");
        if (!titleElement) return [];

        const edgeText = titleElement.textContent.trim();
        const [fromRaw, toRaw] = edgeText.split("->");
        if (!fromRaw || !toRaw) return [];

        return [sanitizeRatioLabel(fromRaw), sanitizeRatioLabel(toRaw)];
      }

      function playNotesByEdgeColor(selectedColor) {
        const normalizedTargetColor = normalizeColor(selectedColor);
        if (!normalizedTargetColor) return;

        const allEdges = document.querySelectorAll(".edge");
        const ratios = new Set();

        allEdges.forEach(edge => {
          if (extractEdgeColor(edge) !== normalizedTargetColor) return;
          extractRatiosFromEdge(edge).forEach(ratio => ratios.add(ratio));
        });

        const ratioList = [...ratios];
        console.log(
          `Playing color group ${normalizedTargetColor}: ${ratioList.join(
            ", "
          )}`
        );
        playRatioGroup(ratioList);
      }

      const SVG_NS = "http://www.w3.org/2000/svg";
      const NODE_RADIUS = 40;
      const COLUMNS = [
        ["1/1"],
        ["10/9", "9/8", "8/7", "7/6", "6/5"],
        ["5/4", "9/7", "4/3", "7/5"],
        ["10/7", "3/2", "14/9", "8/5"],
        ["5/3", "12/7", "7/4", "16/9", "9/5"],
        ["2"]
      ];

      const EDGES = [
        { from: "1/1", to: "6/5", color: "blue" },
        { from: "6/5", to: "7/5", color: "blue" },
        { from: "7/5", to: "8/5", color: "blue" },
        { from: "8/5", to: "9/5", color: "blue" },
        { from: "9/5", to: "2", color: "blue" },
        { from: "1/1", to: "7/6", color: "red" },
        { from: "7/6", to: "4/3", color: "red" },
        { from: "4/3", to: "3/2", color: "red" },
        { from: "3/2", to: "5/3", color: "red" },
        { from: "5/3", to: "2", color: "red" },
        { from: "1/1", to: "8/7", color: "limegreen" },
        { from: "8/7", to: "9/7", color: "limegreen" },
        { from: "9/7", to: "10/7", color: "limegreen" },
        { from: "10/7", to: "12/7", color: "limegreen" },
        { from: "12/7", to: "2", color: "limegreen" },
        { from: "1/1", to: "9/8", color: "orange" },
        { from: "9/8", to: "5/4", color: "orange" },
        { from: "5/4", to: "3/2", color: "orange" },
        { from: "3/2", to: "7/4", color: "orange" },
        { from: "7/4", to: "2", color: "orange" },
        { from: "1/1", to: "10/9", color: "blueviolet" },
        { from: "10/9", to: "4/3", color: "blueviolet" },
        { from: "4/3", to: "14/9", color: "blueviolet" },
        { from: "14/9", to: "16/9", color: "blueviolet" },
        { from: "16/9", to: "2", color: "blueviolet" },
        { from: "1/1", to: "10/9", color: "#008b8b", dashed: true },
        { from: "10/9", to: "5/4", color: "#008b8b", dashed: true },
        { from: "5/4", to: "10/7", color: "#008b8b", dashed: true },
        { from: "10/7", to: "5/3", color: "#008b8b", dashed: true },
        { from: "5/3", to: "2", color: "#008b8b", dashed: true },
        { from: "1/1", to: "9/8", color: "#8b008b", dashed: true },
        { from: "9/8", to: "9/7", color: "#8b008b", dashed: true },
        { from: "9/7", to: "3/2", color: "#8b008b", dashed: true },
        { from: "3/2", to: "9/5", color: "#8b008b", dashed: true },
        { from: "9/5", to: "2", color: "#8b008b", dashed: true },
        { from: "1/1", to: "8/7", color: "#cd9b1d", dashed: true },
        { from: "8/7", to: "4/3", color: "#cd9b1d", dashed: true },
        { from: "4/3", to: "8/5", color: "#cd9b1d", dashed: true },
        { from: "8/5", to: "16/9", color: "#cd9b1d", dashed: true },
        { from: "16/9", to: "2", color: "#cd9b1d", dashed: true },
        { from: "1/1", to: "7/6", color: "#8b4726", dashed: true },
        { from: "7/6", to: "7/5", color: "#8b4726", dashed: true },
        { from: "7/5", to: "14/9", color: "#8b4726", dashed: true },
        { from: "14/9", to: "7/4", color: "#8b4726", dashed: true },
        { from: "7/4", to: "2", color: "#8b4726", dashed: true },
        { from: "1/1", to: "6/5", color: "#7f7f7f", dashed: true },
        { from: "6/5", to: "4/3", color: "#7f7f7f", dashed: true },
        { from: "4/3", to: "3/2", color: "#7f7f7f", dashed: true },
        { from: "3/2", to: "12/7", color: "#7f7f7f", dashed: true },
        { from: "12/7", to: "2", color: "#7f7f7f", dashed: true }
      ];

      function getMarkerId(color) {
        return `arrow-${normalizeColor(color).replace(/[^a-z0-9]/g, "")}`;
      }

      function createArrowMarker(defs, color) {
        const markerId = getMarkerId(color);
        if (defs.querySelector(`#${markerId}`)) return markerId;

        const marker = document.createElementNS(SVG_NS, "marker");
        marker.setAttribute("id", markerId);
        marker.setAttribute("viewBox", "0 0 10 10");
        marker.setAttribute("refX", "8");
        marker.setAttribute("refY", "5");
        marker.setAttribute("markerWidth", "7");
        marker.setAttribute("markerHeight", "7");
        marker.setAttribute("orient", "auto-start-reverse");

        const arrow = document.createElementNS(SVG_NS, "path");
        arrow.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        arrow.setAttribute("fill", color);

        marker.appendChild(arrow);
        defs.appendChild(marker);
        return markerId;
      }

      function getColumnLayout(columns) {
        const marginX = 55;
        const marginY = 58;
        const colGap = 154;
        const rowGap = 102;
        const maxRows = Math.max(...columns.map(column => column.length));
        const width = marginX * 2 + colGap * (columns.length - 1);
        const height = marginY * 2 + rowGap * (maxRows - 1);
        const positionByLabel = new Map();

        columns.forEach((column, columnIndex) => {
          const sorted = [...column].sort(
            (a, b) => parseRatioValue(a) - parseRatioValue(b)
          );
          const x = marginX + colGap * columnIndex;
          const startY = marginY + ((maxRows - sorted.length) * rowGap) / 2;

          sorted.forEach((ratio, rowIndex) => {
            positionByLabel.set(ratio, {
              x,
              y: startY + rowGap * rowIndex
            });
          });
        });

        return { width, height, positionByLabel };
      }

      function createEdgePath(start, end, radius) {
        return createOffsetEdgePath(start, end, radius, 0);
      }

      function createOffsetEdgePath(start, end, radius, offset) {
        const angle = Math.atan2(end.y - start.y, end.x - start.x);
        const normalX = -Math.sin(angle);
        const normalY = Math.cos(angle);
        const sx = start.x + Math.cos(angle) * radius;
        const sy = start.y + Math.sin(angle) * radius;
        const ex = end.x - Math.cos(angle) * radius;
        const ey = end.y - Math.sin(angle) * radius;
        const ssx = sx + normalX * offset;
        const ssy = sy + normalY * offset;
        const eex = ex + normalX * offset;
        const eey = ey + normalY * offset;

        return `M ${ssx} ${ssy} L ${eex} ${eey}`;
      }

      function renderNativeGraph() {
        graphTarget.innerHTML = "";

        const { width, height, positionByLabel } = getColumnLayout(COLUMNS);
        const svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.setAttribute("role", "img");
        svg.setAttribute("aria-label", "9-limit playable graph");

        const defs = document.createElementNS(SVG_NS, "defs");
        svg.appendChild(defs);

        const edgesLayer = document.createElementNS(SVG_NS, "g");
        const nodesLayer = document.createElementNS(SVG_NS, "g");

        const edgeMultiplicity = new Map();
        const edgeDrawIndex = new Map();
        EDGES.forEach(edge => {
          const key = `${edge.from}->${edge.to}`;
          edgeMultiplicity.set(key, (edgeMultiplicity.get(key) || 0) + 1);
        });

        EDGES.forEach(edge => {
          const start = positionByLabel.get(edge.from);
          const end = positionByLabel.get(edge.to);
          if (!start || !end) return;

          const key = `${edge.from}->${edge.to}`;
          const currentIndex = edgeDrawIndex.get(key) || 0;
          edgeDrawIndex.set(key, currentIndex + 1);
          const totalForPair = edgeMultiplicity.get(key) || 1;
          const spacing = 16;
          const pairOffset = (currentIndex - (totalForPair - 1) / 2) * spacing;

          const markerId = createArrowMarker(defs, edge.color);
          const edgeGroup = document.createElementNS(SVG_NS, "g");
          edgeGroup.setAttribute("class", "edge");

          const title = document.createElementNS(SVG_NS, "title");
          title.textContent = `${edge.from}->${edge.to}`;
          edgeGroup.appendChild(title);

          const d = createOffsetEdgePath(start, end, NODE_RADIUS, pairOffset);
          const visiblePath = document.createElementNS(SVG_NS, "path");
          visiblePath.setAttribute("class", "edge-path");
          visiblePath.setAttribute("d", d);
          visiblePath.setAttribute("fill", "none");
          visiblePath.setAttribute("stroke", edge.color);
          visiblePath.setAttribute("stroke-width", edge.dashed ? "2" : "3");
          visiblePath.setAttribute("marker-end", `url(#${markerId})`);
          if (edge.dashed) visiblePath.setAttribute("stroke-dasharray", "8 6");

          const hitPath = document.createElementNS(SVG_NS, "path");
          hitPath.setAttribute("class", "edge-hit-area");
          hitPath.setAttribute("d", d);

          edgeGroup.appendChild(visiblePath);
          edgeGroup.appendChild(hitPath);
          edgeGroup.addEventListener("click", event => {
            event.stopPropagation();
            playNotesByEdgeColor(edge.color);
          });

          edgesLayer.appendChild(edgeGroup);
        });

        [...positionByLabel.entries()].forEach(([ratio, position]) => {
          const nodeGroup = document.createElementNS(SVG_NS, "g");
          nodeGroup.setAttribute("class", "node");

          const title = document.createElementNS(SVG_NS, "title");
          title.textContent = ratio;
          nodeGroup.appendChild(title);

          const circle = document.createElementNS(SVG_NS, "circle");
          circle.setAttribute("cx", position.x);
          circle.setAttribute("cy", position.y);
          circle.setAttribute("r", NODE_RADIUS);
          circle.setAttribute("fill", "#ffffff");
          circle.setAttribute("stroke", "#121212");
          circle.setAttribute("stroke-width", "2");

          const text = document.createElementNS(SVG_NS, "text");
          text.setAttribute("x", position.x);
          text.setAttribute("y", position.y + 7);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-family", "Sora, Segoe UI, sans-serif");
          text.setAttribute("font-size", "15");
          text.setAttribute("fill", "#101820");
          text.textContent = ratio;

          nodeGroup.appendChild(circle);
          nodeGroup.appendChild(text);
          nodeGroup.addEventListener("click", () => {
            playTone(ratio);
          });

          nodesLayer.appendChild(nodeGroup);
        });

        svg.appendChild(edgesLayer);
        svg.appendChild(nodesLayer);
        graphTarget.appendChild(svg);
      }

      renderNativeGraph();
    </script>
  </body>
</html>
